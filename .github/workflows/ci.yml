name: CI

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    # Daily at 07:00 UTC (scheduled runs use the default branch)
    - cron: "0 7 * * *"
  push:
    branches:
      - "**"
      - "!dependabot/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    if: github.actor != 'dependabot[bot]'
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "**/go.sum"
          check-latest: false

      # Deps are private (hydn-co/mesh-sdk + substrate); mint a GitHub App token and
      # configure git insteadOf + GOPRIVATE before any module fetch.
      - name: Set up private Go module access
        uses: hydn-co/build-tools/.github/actions/setup-go-private@main
        with:
          client-id: ${{ secrets.MESH_MODULES_APP_CLIENT_ID }}
          private-key: ${{ secrets.MESH_MODULES_APP_KEY }}

      - name: Download Go modules
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -timeout 30s
  entity-contract:
    if: github.actor != 'dependabot[bot]'
    uses: hydn-co/build-tools/.github/workflows/entity-contract-check.yml@main
    secrets: inherit
